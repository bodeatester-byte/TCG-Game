<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer TCG Arena</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- 1. ECRAN AUTENTIFICARE -->
    <div id="auth-container" class="auth-box">
        <h2>⚔️ TCG ARENA LOGIN</h2>
        <input type="text" id="username-input" placeholder="Username..." maxlength="15">
        <input type="password" id="password-input" placeholder="Parolă...">
        <div class="auth-buttons">
            <button id="login-btn">Log In</button>
            <button id="register-btn" class="btn-secondary">Înregistrare</button>
        </div>
        <p id="auth-message" style="color: #ff4757; font-weight: bold; margin-top: 10px;"></p>
    </div>

    <!-- 2. ECRAN LOBBY RESPONSIV -->
    <div id="lobby-container" class="lobby-box" style="display: none;">
        
              <!-- ================= START HAMBURGER MENU STÂNGA ================= -->
<!-- Butonul Hamburger (Apasă pe el pentru a deschide/închide) -->
<button type="button" onclick="toggleLobbyMenu()" style="position: absolute; top: 20px; left: 20px; background: none; border: none; cursor: pointer; z-index: 1001; display: flex; flex-direction: column; gap: 5px; padding: 10px;">
    <span style="width: 25px; height: 3px; background-color: #ffffff; border-radius: 2px;"></span>
    <span style="width: 25px; height: 3px; background-color: #ffffff; border-radius: 2px;"></span>
    <span style="width: 25px; height: 3px; background-color: #ffffff; border-radius: 2px;"></span>
</button>

<!-- Meniul Lateral Culisant -->
<div id="lobby-side-menu" style="position: absolute; top: 0; left: -260px; width: 240px; height: 100%; background: rgba(15, 15, 25, 0.95); border-right: 2px solid #2a2a40; transition: left 0.3s ease; z-index: 1000; padding: 80px 20px 20px 20px; box-sizing: border-box;">
    
    <!-- Containerul modificat primit de la tine -->
    <div class="lobby-header-wrapper" style="text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px;">
        <!-- Numele utilizatorului preia ID-ul tău original pentru a nu strica scriptul de login -->
        <h2 style="margin: 0; font-size: 20px; color: #ffffff; font-weight: bold;">
            <span id="lobby-welcome-user">Jucător</span>
        </h2>
        
        <!-- Butonul de Log Out original păstrat intact pentru funcționalitate -->
        <button id="logout-btn" class="logout-premium" style="width: 100%; max-width: 160px;">
            <span class="logout-icon">➔</span> LOG OUT
        </button>

        <!-- SECTIUNE COINS (Adăugată direct sub butonul de Log Out) -->
               <div class="coins-display" style="color: #ffd700; font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px; background: rgba(255, 215, 0, 0.1); padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255, 215, 0, 0.3); width: 100%; max-width: 160px; box-sizing: border-box; justify-content: center; margin-top: 5px;">
            <!-- Exemplu dacă imaginea se află în folderul "images" -->
            <img src="imagini/coin.png" alt="Coin" style="width: 22px; height: 22px; object-fit: contain;"> 
            <span id="lobby-user-coins">0</span>
        </div>
    </div>
<!-- Separator vizual în meniul hamburger -->
<hr style="border: 0; border-top: 1px solid #2a2a40; width: 100%; margin: 15px 0;">

<!-- Butonul pentru a deschide magazinul -->
<button onclick="toggleShopLayout()" style="background: #2a2a40; color: #ffd700; border: 1px solid #ffd700; width: 100%; max-width: 160px; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
    🛒 SHOP
</button>

<!-- Fereastra Pop-up / Containerul Magazinului --><div id="lobby-shop-modal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: rgba(15, 15, 25, 0.98); border: 2px solid #ffd700; border-radius: 12px; padding: 20px; z-index: 2000; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); box-sizing: border-box;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin: 0; color: #ffd700; font-size: 18px;">Magazin Pachete</h3>
        <button onclick="toggleShopLayout()" style="background: none; border: none; color: #fff; font-size: 18px; cursor: pointer;">✕</button>
    </div>

    <div style="display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; padding-right: 5px;">
        
                <!-- Golem (200 Coins) -->
        <div style="display: flex; justify-content: space-between; align-items: center; background: #222235; padding: 10px; border-radius: 6px;">
            <div>
                <span style="color: #fff; font-weight: bold; font-size: 14px;">🗿 Pachet Golem</span>
            </div>
            <button onclick="buyPack('golem')" style="background: #ffd700; color: #000; border: none; padding: 6px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                200 <img src="imagini/coin.png" alt="Coin" style="width: 14px; height: 14px; object-fit: contain;">
            </button>
        </div>

        <!-- Undead (300 Coins) -->
        <div style="display: flex; justify-content: space-between; align-items: center; background: #222235; padding: 10px; border-radius: 6px;">
            <div>
                <span style="color: #fff; font-weight: bold; font-size: 14px;">💀 Pachet Undead</span>
            </div>
            <button onclick="buyPack('undead')" style="background: #ffd700; color: #000; border: none; padding: 6px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                300 <img src="imagini/coin.png" alt="Coin" style="width: 14px; height: 14px; object-fit: contain;">
            </button>
        </div>

        <!-- Spirite (400 Coins) - Corectat la singular pentru compatibilitate totală -->
        <div style="display: flex; justify-content: space-between; align-items: center; background: #222235; padding: 10px; border-radius: 6px;">
            <div>
                <span style="color: #fff; font-weight: bold; font-size: 14px;">🔥 Pachet Spirite</span>
            </div>
            <!-- REPARAT: id="btn-shop-spirit" și buyPack('spirit') -->
            <button id="btn-shop-spirit" onclick="buyPack('spirit')" style="background: #ffd700; color: #000; border: none; padding: 6px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                400 <img src="imagini/coin.png" alt="Coin" style="width: 14px; height: 14px; object-fit: contain;">
            </button>
        </div>

        <!-- Mecha (500 Coins) -->
        <div style="display: flex; justify-content: space-between; align-items: center; background: #222235; padding: 10px; border-radius: 6px;">
            <div>
                <span style="color: #fff; font-weight: bold; font-size: 14px;">🤖 Pachet Mecha</span>
            </div>
            <button onclick="buyPack('mecha')" style="background: #ffd700; color: #000; border: none; padding: 6px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                500 <img src="imagini/coin.png" alt="Coin" style="width: 14px; height: 14px; object-fit: contain;">
            </button>
        </div>

    </div>
</div>

</div>

<!-- Script simplu pentru deschiderea meniului (Adaugă-l dacă nu ai deja unul similar) -->
<script>
function toggleLobbyMenu() {
    const menu = document.getElementById('lobby-side-menu');
    if (menu.style.left === '0px') {
        menu.style.left = '-260px';
    } else {
        menu.style.left = '0px';
    }
}
</script>
<!-- ================= END HAMBURGER MENU STÂNGA ================= -->



               <!-- REPARAT: SECTOR RESPONSIV CU ID-URI PENTRU ASCUNDERE/AFISARE DIN SHOP -->
        <div class="deck-selector" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 25px 0; width: 100%;">
            
            <!-- Adăugat id="lobby-pack-dragon" -->
            <label id="lobby-pack-dragon" class="deck-option" style="cursor: pointer;">
                <input type="radio" name="deck-choice" value="dragon" checked style="display: none;">
                <div class="deck-card deck-dragon-bg">
                    <span>DRAGONI</span>
                </div>
            </label>

            <!-- Adăugat id="lobby-pack-golem" -->
            <label id="lobby-pack-golem" class="deck-option" style="cursor: pointer;">
                <input type="radio" name="deck-choice" value="golem" style="display: none;">
                <div class="deck-card deck-golem-bg">
                    <span>GOLEMI</span>
                </div>
            </label>

            <!-- Adăugat id="lobby-pack-undead" -->
            <label id="lobby-pack-undead" class="deck-option" style="cursor: pointer;">
                <input type="radio" name="deck-choice" value="undead" style="display: none;">
                <div class="deck-card deck-undead-bg">
                    <span>UNDEAD</span>
                </div>
            </label>

            <!-- Adăugat id="lobby-pack-spirit" (Corectat conform value="spirit") -->
            <label id="lobby-pack-spirit" class="deck-option" style="cursor: pointer;">
                <input type="radio" name="deck-choice" value="spirit" style="display: none;">
                <div class="deck-card deck-spirit-bg">
                    <span>SPIRITE</span>
                </div>
            </label>

            <!-- Adăugat id="lobby-pack-mecha" -->
            <label id="lobby-pack-mecha" class="deck-option" style="cursor: pointer;">
                <input type="radio" name="deck-choice" value="mecha" style="display: none;">
                <div class="deck-card deck-mecha-bg">
                    <span>MECHA</span>
                </div>
            </label>

        </div>


        <div id="leaderboard-section">
            <h3>🏆 TOP 10 CÂȘTIGĂTORI</h3>
            <table>
                <thead>
                    <tr><th style="width: 20%;">Loc</th><th style="width: 50%;">Utilizator</th><th style="width: 30%; text-align: right;">Victorii</th></tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="3" style="text-align:center; color:#666;">Se încarcă...</td></tr>
                </tbody>
            </table>
        </div>
        <button id="find-game-btn">Find Game</button>
    </div>

    <!-- 3. ARENA DE JOC -->
    <div id="game-container" style="display: none;">
        <div class="player-section top-section">
            <div class="player-info-bar">
                <span class="username-tag">👑 <span id="p2-username">Inamic</span></span>
                <span class="lp-tag">❤️ LP: <span id="p2-lp">8000</span></span>
            </div>
            <div class="game-row">
                <div id="p2-deck" class="deck-slot">DECK</div>
                <div id="p2-hand" class="hand-container"></div>
                <div id="p2-graveyard" class="deck-slot graveyard-slot">GY</div>
            </div>
            <div class="field-wrapper"><div id="p2-field" class="field-container"></div></div>
        </div>

        <div class="arena-center-bar">
            <div id="game-message">Pregătire teren de joc...</div>
            <div class="center-buttons">
                <button id="mulligan-btn" style="display: none;">🔄 Mulligan</button>
                <button id="end-turn-btn">⏳ Termină Tura</button>
                <button id="go-lobby-btn" class="btn-danger">🏳️ Abandon</button>
            </div>
        </div>

        <div class="player-section bottom-section">
            <div class="field-wrapper"><div id="p1-field" class="field-container"></div></div>
            <div class="game-row">
                <div id="p1-deck" class="deck-slot">DECK</div>
                <div id="p1-hand" class="hand-container"></div>
                <div id="p1-graveyard" class="deck-slot graveyard-slot">GY</div>
            </div>
            <div class="player-info-bar">
                <span class="username-tag">🛡️ <span id="p1-username">Tu</span></span>
                <span class="lp-tag">❤️ LP: <span id="p1-lp">8000</span></span>
            </div>
        </div>
    </div>

    <!-- CHAT PE STÂNGA ȘI ELEMENT BANNER ANIMAȚIE -->
    <button id="chat-hamburger">☰ Chat <span id="chat-badge"></span></button>
    <div id="chat-sidebar" class="sidebar">
        <div class="sidebar-header"><h3>💬 Chat</h3><button id="chat-close">✖</button></div>
        <div id="chat-messages" class="chat-body"></div>
        <div class="sidebar-footer">
            <input type="text" id="chat-message-input" placeholder="Scrie ceva..." maxlength="60">
            <button id="chat-send-btn">Trimite</button>
        </div>
    </div>

    <div id="turn-banner">TURA TA</div>
    <script src="app.js"></script>
</body>
</html>
